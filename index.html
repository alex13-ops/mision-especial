<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Una misión para nosotros ❤️</title>

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap"

<body>

    <!-- Fondo -->

    <div class="background"></div>

    <!-- Pantalla inicial -->

    <section class="intro">

<div class="envelope">

    <div class="envelope-body">

        <div class="envelope-flap"></div>

        <div class="letter-preview">

            <span>✉</span>

        </div>

    </div>

    <h2>Has recibido una misión especial</h2>

    <p>
        Solo necesitas un poco de curiosidad para descubrirla.
    </p>

    <button id="open">
        Abrir misión
    </button>


        </div>

    </section>

    <!-- Invitación -->

    <section class="invitation hidden">

        <div class="card">

            <div class="sky">

                <div class="cloud cloud1"></div>
                <div class="cloud cloud2"></div>
                <div class="cloud cloud3"></div>

            </div>

            <div class="content">

                <h1>

                    Tengo una misión para los dos.

                </h1>

                <div id="typewriter"></div>

<div id="accept" class="ticket">

    <div class="ticket-top">
        🎟 MISIÓN ESPECIAL
    </div>

    <div class="ticket-body">


        <p>
            Una aventura nos espera...
        </p>

        <span>
             ✨
        </span>


        <p>
            Aceptas ? 
        </p>

    </div>

</div>

            </div>

        </div>

    </section>

    <!-- Final -->

    <section class="ending hidden">

        <div class="ending-card">

            <h1>

                ❤️

            </h1>

            <h2>

                Misión aceptada

            </h2>

            <p>

                Nos vemos hoy para revivir nuestro niño interior. 🎬✨

            </p>

        </div>

    </section>

<script src="script.js"></script>
